name: Test FR QC real

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test real francophone candidates
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          P="https://iptv-lake-three.vercel.app/api/fr?u="
          declare -A C=(
            ["Noovo national 9c9"]="https://pe-fa-lp03a.9c9media.com/live/NOOVO/p/hls/00000201/716cf4c845225692/manifest.m3u8"
            ["Noovo brightcove"]="https://bcsecurelivehls-i.akamaihd.net/hls/live/551061/618566855001/master.m3u8"
            ["CPAC FR brightcove"]="https://bcsecurelivehls-i.akamaihd.net/hls/live/680604/1242843915001_3/master.m3u8"
            ["CPAC FR cloudfront"]="https://d7z3qjdsxbwoq.cloudfront.net/groupa/live/f9809cea-1e07-47cd-a94d-2ddd3e1351db/live.isml/.m3u8"
            ["TV5 Quebec reseller"]="http://23.133.220.149/TV5/index.m3u8"
            ["NRJ12 raw"]="https://nrj12.nrjaudio.fm/hls/live/2038374/nrj_12/master.m3u8"
            ["NRJ12 via proxy"]="${P}https%3A%2F%2Fnrj12.nrjaudio.fm%2Fhls%2Flive%2F2038374%2Fnrj_12%2Fmaster.m3u8"
          )
          for name in "${!C[@]}"; do
            url="${C[$name]}"
            host=$(echo "$url" | sed -E 's#^(https?://[^/]+)/.*#\1#')
            body=$(curl -A "$UA" -e "$host/" -s -m 20 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            if printf '%s' "$body" | grep -q '#EXTM3U'; then r="OK  "; else r="FAIL"; fi
            printf '%s | %s | %s\n' "$r" "${code:-000}" "$name"
          done | sort
