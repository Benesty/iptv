name: extract-official
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: FAST platforms (corrected endpoints + connectivity control)
        run: |
          python3 - <<'PY'
          import urllib.request, urllib.error, re, unicodedata
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          def get(url,n=8_000_000,hdr=None):
              h={"User-Agent":UA,"Accept":"*/*","Referer":"https://www.mjh.nz/"}
              if hdr:h.update(hdr)
              try:
                  r=urllib.request.urlopen(urllib.request.Request(url,headers=h),timeout=30)
                  return r.status, r.read(n).decode("utf-8","replace")
              except urllib.error.HTTPError as e: return e.code,""
              except Exception as e: return 0,f"{type(e).__name__}"
          def norm(s):
              s=unicodedata.normalize("NFKD",s or "").encode("ascii","ignore").decode()
              return re.sub(r"[^a-z0-9]+","",s.lower())

          print("### connectivity control (jmp2 redirector, used by RMC Découverte) ###")
          for u in ["https://jmp2.uk/stvp-FRBD4100008QS.m3u8","https://jmp2.uk/stvp-FRBD4100008QS"]:
              st,b=get(u,4000); print(f"  {st}  {u}  extm3u={'#EXTM3U' in b}")

          # Corrected / alternative FAST endpoints
          FAST={
            "Samsung-fr":"https://i.mjh.nz/SamsungTVPlus/fr.m3u8",
            "Samsung-all":"https://i.mjh.nz/SamsungTVPlus/all.m3u8",
            "Pluto-fr":"https://i.mjh.nz/PlutoTV/fr.m3u8",
            "Plex-all":"https://i.mjh.nz/Plex/all.m3u8",
            "Roku-all":"https://i.mjh.nz/Roku/all.m3u8",
            # iptv-org provider feeds (Samsung / Pluto / Rakuten indexed, clear)
            "iptvorg-samsung":"https://iptv-org.github.io/iptv/index.m3u",
          }
          WANT={"M6":["m6"],"W9":["w9"],"6ter":["6ter"],"Gulli":["gulli"],"AB1":["ab1"],
                "RTL9":["rtl9"],"Teletoon":["teletoon"],"ParisPremiere":["parispremiere"],
                "Nickelodeon":["nickelodeon"],"NickJunior":["nickjr","nickjunior"],
                "DisneyJunior":["disneyjunior"],"Cherie25":["cherie"]}
          found={}
          for plat,url in FAST.items():
              st,body=get(url)
              n=body.count("#EXTINF")
              print(f"\n===== {plat}: HTTP {st} ({n} chaînes) =====")
              if st!=200 or n==0: continue
              lines=body.split("\n")
              for i,l in enumerate(lines):
                  if not l.startswith("#EXTINF"): continue
                  disp=l.split(",",1)[-1].strip(); nd=norm(disp)
                  # only French entries for the big index
                  for want,keys in WANT.items():
                      if any(k in nd for k in keys) and "fr" in norm(l):
                          u=""
                          for j in range(i+1,min(i+4,len(lines))):
                              if lines[j].strip().startswith("http"): u=lines[j].strip(); break
                          print(f"   [{want:14}] {disp[:42]:42} -> {u[:80]}")
                          found.setdefault(want,[]).append(u)
          print("\n===== SYNTHÈSE =====")
          for w in WANT: print(f"  {'✅' if found.get(w) else '❌'} {w}")
          PY
