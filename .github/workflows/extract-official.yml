name: extract-official
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: search official FAST platforms for our channels
        run: |
          python3 - <<'PY'
          import urllib.request, urllib.error, re, unicodedata
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          def get(url,n=6_000_000):
              try:
                  r=urllib.request.urlopen(urllib.request.Request(url,headers={"User-Agent":UA}),timeout=30)
                  return r.status, r.read(n).decode("utf-8","replace")
              except urllib.error.HTTPError as e: return e.code,""
              except Exception as e: return 0,f"{type(e).__name__}"
          def norm(s):
              s=unicodedata.normalize("NFKD",s or "").encode("ascii","ignore").decode()
              return re.sub(r"[^a-z0-9]+","",s.lower())

          # Official FAST platform playlists (legal, clear, DRM-free), maintained by matt huisman
          FAST={
            "SamsungTVPlus-FR":"https://i.mjh.nz/SamsungTVPlus/fr.m3u8",
            "PlutoTV-FR":"https://i.mjh.nz/PlutoTV/fr.m3u8",
            "Plex-FR":"https://i.mjh.nz/Plex/fr.m3u8",
            "Stirr":"https://i.mjh.nz/Stirr/all.m3u8",
            "SamsungTVPlus-ALL":"https://i.mjh.nz/SamsungTVPlus/all.m3u8",
          }
          # channels we want an official/clear source for (name variants)
          WANT={
            "M6":["m6"], "W9":["w9"], "6ter":["6ter"], "Gulli":["gulli"],
            "AB1":["ab1"], "RTL9":["rtl9"], "Teletoon":["teletoon"],
            "ParisPremiere":["parispremiere"], "Nickelodeon":["nickelodeon"],
            "NickelodeonJunior":["nickelodeonjunior","nickjr","nickjunior"],
            "DisneyJunior":["disneyjunior"], "Cherie25":["cherie25","cherie"],
            "Teva":["teva"], "Paramount":["paramount"], "Boomerang":["boomerang"],
            "CartoonNetwork":["cartoonnetwork"], "Warner":["warnertv"],
          }
          found={}
          for plat,url in FAST.items():
              st,body=get(url)
              print(f"\n===== {plat}: HTTP {st} ({body.count('#EXTINF')} chaînes) =====")
              if st!=200: continue
              lines=body.split("\n")
              for i,l in enumerate(lines):
                  if not l.startswith("#EXTINF"): continue
                  disp=l.split(",",1)[-1].strip()
                  nd=norm(disp)
                  for want,keys in WANT.items():
                      if any(k in nd for k in keys):
                          u=""
                          for j in range(i+1,min(i+4,len(lines))):
                              if lines[j].strip().startswith("http"): u=lines[j].strip(); break
                          print(f"   [{want:18}] {disp[:45]:45} -> {u[:95]}")
                          found.setdefault(want,[]).append((plat,disp,u))
          print("\n\n===== SYNTHÈSE : chaînes voulues trouvées sur une plateforme FAST =====")
          for w in WANT:
              print(f"  {'✅' if w in found else '❌'} {w}: {len(found.get(w,[]))} source(s) FAST")
          PY
