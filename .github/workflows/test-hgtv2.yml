name: Test HGTV paths

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test HGTV path variants
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          declare -A C=(
            ["23.237 HGTV plain"]="http://23.237.104.106:8080/HGTV/index.m3u8"
            ["23.237 USA_HGTV mono"]="http://23.237.104.106:8080/USA_HGTV/tracks-v1a1/mono.m3u8"
            ["23.237 USA_HG_TV"]="http://23.237.104.106:8080/USA_HG_TV/index.m3u8"
            ["moveonjoy fl1 HGTV"]="http://fl1.moveonjoy.com/HGTV/index.m3u8"
            ["moveonjoy fl2 HGTV"]="http://fl2.moveonjoy.com/HGTV/index.m3u8"
            ["moveonjoy fl5 HGTV"]="http://fl5.moveonjoy.com/HGTV/index.m3u8"
          )
          for name in "${!C[@]}"; do
            url="${C[$name]}"
            host=$(echo "$url" | sed -E 's#^(https?://[^/]+)/.*#\1#')
            body=$(curl -A "$UA" -e "$host/" -s -m 18 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            if printf '%s' "$body" | grep -q '#EXTM3U'; then r="OK  "; else r="FAIL"; fi
            printf '%s | %s | %s\n' "$r" "${code:-000}" "$name"
          done | sort
