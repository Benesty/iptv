name: Test CBC News off

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test CBC News official + BNN
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          declare -A C=(
            ["CBC News Network official geo-CA"]="https://cbcrclinear-tor.akamaized.net/hls/live/2042769/geo_allow_ca/CBCRCLINEAR_TOR_15/master5.m3u8"
            ["Gusto TV current"]="https://e75fc053c0d2406fb74cdd71d77e1a7f.mediatailor.us-east-1.amazonaws.com/v1/master/f4e8c53a8367a5b58e20ce054ea3ce25a3e904d3/RakutenTV-eu_GustoTV/playlist.m3u8"
          )
          for name in "${!C[@]}"; do
            url="${C[$name]}"
            host=$(echo "$url" | sed -E 's#^(https?://[^/]+)/.*#\1#')
            body=$(curl -A "$UA" -e "$host/" -s -m 18 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            if printf '%s' "$body" | grep -q '#EXTM3U'; then r="OK  "; else r="FAIL"; fi
            printf '%s | %s | %s\n' "$r" "${code:-000}" "$name"
          done | sort
