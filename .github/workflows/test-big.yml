          test_one "SFR BFM TV"          "https://ncdn-live-bfm.pfd.sfr.net/shls/LIVE\$BFM_TV/index.m3u8?start=LIVE&end=END"
          test_one "SFR BFM Business"    "https://ncdn-live-bfm.pfd.sfr.net/shls/LIVE\$BFM_BUSINESS/index.m3u8?start=LIVE&end=END"
