name: Test big list

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test raw + proxy
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          PX="https://iptv-lake-three.vercel.app/api/fr?u="
          enc(){ python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1],safe=''))" "$1"; }
          test_one(){
            local label="$1" url="$2"
            local host=$(echo "$url" | sed -E 's#^(https?://[^/]+)/.*#\1#')
            local body=$(curl -A "$UA" -e "$host/" -s -m 18 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            local code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            local r="FAIL"; printf '%s' "$body" | grep -q '#EXTM3U' && r="OK  "
            printf '%s | raw=%s ' "$r" "${code:-000}"
            local pbody=$(curl -A "$UA" -s -m 22 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "${PX}$(enc "$url")" 2>/dev/null)
            local pcode=$(printf '%s' "$pbody" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            local pr="FAIL"; printf '%s' "$pbody" | grep -q '#EXTM3U' && pr="OK"
            printf '| proxy=%s %s | %s\n' "${pcode:-000}" "$pr" "$label"
          }
          test_one "TF1+ TF1"            "https://live-tf1-hls.cdn-0.diff.tf1.fr/out/v1/780542f516f143fc8ad9bf14622316e7/tf1-cmaf/index.m3u8"
          test_one "TF1+ TMC"            "https://live-tmc-hls.cdn-0.diff.tf1.fr/out/v1/44fcb1c776284f2da7c11ef948d7ef34/tmc-cmaf/index.m3u8"
          test_one "TF1+ TFX"            "https://live-tfx-hls.cdn-0.diff.tf1.fr/out/v1/54408d0e39304776bf7b2ce4b1599123/tfx-cmaf/index.m3u8"
          test_one "TF1+ TF1SeriesFilms" "https://live-tsf-hls.cdn-0.diff.tf1.fr/out/v1/9990671b96634d799552358352b2570a/tf1-series-film-cmaf/index.m3u8"
          test_one "TF1+ LCI"            "https://live-lci-hls.cdn-0.diff.tf1.fr/out/v1/917aad4fa72f42f7ba7f486226f54bc4/lci-cmaf/index.m3u8"
          test_one "TF1 ancien TMC"      "https://tmc-hls-live-cdn1.tf1.fr/out/v1/982927d0b5d24bd58ac42184b10c63d7/index.m3u8"
          test_one "TF1 ancien TFX"      "https://tfx-hls-live-cdn1.tf1.fr/out/v1/818e38d791854222b71a950791fb7002/index.m3u8"
          test_one "TF1 ancien LCI"      "https://lci-hls-live-cdn1.tf1.fr/out/v1/1330f53e0d214a9ead65ac455bf79786/index.m3u8"
          test_one "M6+ M6"              "https://origin-m6web.live.6cloud.fr/out/v1/6play/6play-m6/cmaf_q2hyb21h/index-hd720.m3u8"
          test_one "M6+ W9"              "https://origin-m6web.live.6cloud.fr/out/v1/6play/6play-w9/cmaf_q2hyb21h/hls-short-hd.m3u8"
          test_one "M6+ Gulli"           "https://origin2-6play.live.6cloud.fr/pool_rnpls9by/gulli/sixplaysd/hls_short_q2hyb21h_gulli/index.m3u8"
