name: Test big batch

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test FR+US+CA candidates
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          P="https://iptv-lake-three.vercel.app/api/fr?id="
          declare -A C=(
            ["FR franceinfo"]="${P}FranceInfo.fr"
            ["FR LCP"]="${P}LaChaineParlementaire.fr"
            ["FR Public Senat"]="${P}PublicSenat2424.fr"
            ["FR T18"]="${P}T18.fr"
            ["FR L'Equipe"]="${P}LEquipe21.fr"
            ["US ABC News Live"]="https://jmp2.uk/plu-6508be683a0d700008c534e4.m3u8"
            ["US NBC News Now"]="https://jmp2.uk/plu-5df97894467dfa00091c873c.m3u8"
            ["US CBS News 247"]="https://jmp2.uk/plu-5a6b92f6e22a617379789618.m3u8"
            ["US Newsmax"]="https://nmx1ota.akamaized.net/hls/live/2107010/Live_1/index.m3u8"
            ["US Scripps News"]="https://jmp2.uk/stvp-USBD3000073N"
            ["US Cheddar"]="https://jmp2.uk/stvp-USAJ3504714A"
            ["US Fox Weather"]="https://jmp2.uk/stvp-USBD700003L7"
            ["US NFL Channel"]="https://jmp2.uk/plu-5ced7d5df64be98e07ed47b6.m3u8"
            ["US beIN Sports XTRA"]="https://d9ssxzmclhfo4.cloudfront.net/bein_sports.m3u8"
            ["US Stadium"]="https://jmp2.uk/stvp-USAJ3504705A"
            ["US Tennis Channel"]="https://cdn-uw2-prod.tsv2.amagi.tv/linear/amg01444-tennischannelth-tennischnlintl-lggb/playlist.m3u8"
            ["US Court TV"]="https://jmp2.uk/stvp-USBA34000049Z"
            ["US Comedy Central"]="https://jmp2.uk/plu-5ca671f215a62078d2ec0abf.m3u8"
            ["US MTV"]="https://jmp2.uk/plu-5ca672f515a62078d2ec0ad2.m3u8"
            ["US BET"]="https://jmp2.uk/plu-5ca670f6593a5d78f0e85aed.m3u8"
            ["US Pluto History"]="https://jmp2.uk/plu-5a4d35dfa5c02e717a234f86.m3u8"
            ["US Stories by AMC"]="https://jmp2.uk/plu-62f2ce24f328e00007e7f55a.m3u8"
            ["US Paramount Movie"]="https://jmp2.uk/plu-5cb0cae7a461406ffe3f5213.m3u8"
            ["US Hallmark Movies"]="https://jmp2.uk/stvp-USBD270001633"
            ["US Comet"]="https://fast-channels.sinclairstoryline.com/COMET/index.m3u8"
            ["US MeTV"]="https://82934cf9c8696bd2.mediapackage.us-east-1.amazonaws.com/out/v1/23685237ffbb4047a8143ac2166ead44/index.m3u8"
            ["US PBS Kids"]="https://jmp2.uk/stvp-USBC3600013PC"
            ["US WeatherNation"]="https://jmp2.uk/rok-a1e38b83ae2a56f09f4d2ee8ed206b35.m3u8"
            ["US Buzzr"]="https://buzzrota-ono.amagi.tv/playlist.m3u8"
            ["CA ICI Quebec"]="https://rcavlive.akamaized.net/hls/live/664045/cancbvt/master.m3u8"
            ["CA ICI Saguenay"]="https://rcavlive.akamaized.net/hls/live/704023/cancktv/master.m3u8"
            ["CA ICI Mauricie"]="https://rcavlive.akamaized.net/hls/live/704021/cancktm/master.m3u8"
            ["CA ICI Est-du-Quebec"]="https://rcavlive.akamaized.net/hls/live/704024/cancjbr/master.m3u8"
            ["CA ICI Ottawa-Gat"]="https://rcavlive.akamaized.net/hls/live/664046/cancboft/master.m3u8"
            ["CA ICI Ontario"]="https://rcavlive.akamaized.net/hls/live/704022/cancblft/master.m3u8"
            ["CA TVA national"]="https://tvalive.akamaized.net/hls/live/2012413/tva01/master.m3u8"
            ["CA Canal Savoir"]="https://hls.savoir.media/live/stream.m3u8"
            ["CA CPAC EN"]="https://d7z3qjdsxbwoq.cloudfront.net/groupa/live/f9809cea-1e07-47cd-a94d-2ddd3e1351db/live.isml/.m3u8"
            ["CA CPAC FR"]="https://bcsecurelivehls-i.akamaihd.net/hls/live/680604/1242843915001_3/master.m3u8"
            ["CA Noovo national"]="https://bcsecurelivehls-i.akamaihd.net/hls/live/551061/618566855001/master.m3u8"
            ["CA Global Toronto"]="https://d128o1k7zh3htz.cloudfront.net/out/v1/74a58360a3734f97b74ba439bc678044/index.m3u8"
            ["CA Zeste"]="https://vmediazeste.akamaized.net/no/V-ZESTE/V-ZESTE.isml/V-ZESTE.m3u8"
            ["CA RadioCanada Info"]="https://jmp2.uk/stvp-CAAJ17000040F"
            ["CA Red Green"]="https://jmp2.uk/stvp-CAAJ3400006QE"
          )
          for name in "${!C[@]}"; do
            url="${C[$name]}"
            host=$(echo "$url" | sed -E 's#^(https?://[^/]+)/.*#\1#')
            body=$(curl -A "$UA" -e "$host/" -s -m 25 -L --max-filesize 300000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            if printf '%s' "$body" | grep -q '#EXTM3U'; then r="OK  "; else r="FAIL"; fi
            printf '%s | %s | %s\n' "$r" "${code:-000}" "$name"
          done | sort
