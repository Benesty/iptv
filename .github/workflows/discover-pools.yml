name: discover-pools
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: validate + fetch metadata for the FR channels to add
        run: |
          python3 - <<'PY'
          import urllib.request, re
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          def get(url,n=9_000_000):
              try:
                  r=urllib.request.urlopen(urllib.request.Request(url,headers={"User-Agent":UA}),timeout=30)
                  return r.status, r.read(n).decode("utf-8","replace")
              except urllib.error.HTTPError as e: return e.code,""
              except Exception as e: return 0,f"{type(e).__name__}"

          TARGETS=[
            ("Ciné+ Émotion","http://145.239.5.177/337/index.m3u8",["cine+emotion","cineplusemotion","cine+ emotion"]),
            ("Serie Club","http://145.239.5.177/355/index.m3u8",["serieclub","serie club"]),
            ("TV Breizh","http://145.239.5.177/318/index.m3u8",["tvbreizh","tv breizh"]),
            ("Teva","http://145.239.5.177/356/index.m3u8",["teva"]),
            ("M6 Music","http://145.239.5.177/320/index.m3u8",["m6music","m6 music"]),
            ("Foot+","http://145.239.5.177/556a/index.m3u8",["foot+","footplus"]),
            ("Canal+ Cinémas","http://151.80.18.177:86/Canal+_cinema_HD/index.m3u8",["canal+cinema","canalpluscinema","canal+ cinema"]),
            ("Disney Channel","http://151.80.18.177:86/Disney_Channel_HD/index.m3u8",["disneychannel","disney channel"]),
          ]
          # pull iptv-org for metadata
          _,idx=get("https://iptv-org.github.io/iptv/countries/fr.m3u")
          _,idx2=get("https://iptv-org.github.io/iptv/index.m3u")
          allmeta=(idx+"\n"+idx2).split("\n")
          def find_meta(keys):
              for i,l in enumerate(allmeta):
                  if not l.startswith("#EXTINF"): continue
                  disp=l.split(",",1)[-1].strip().lower().replace(" ","")
                  if any(k.replace(" ","") in disp for k in keys):
                      tid=(re.search(r'tvg-id="([^"]*)"',l) or [None,""])[1]
                      logo=(re.search(r'tvg-logo="([^"]*)"',l) or [None,""])[1]
                      if tid or logo: return tid,logo
              return "",""

          def alive(u):
              st,b=get(u,400)
              return st==200 and b.lstrip().startswith("#EXT")

          for name,url,keys in TARGETS:
              ok=alive(url)
              tid,logo=find_meta(keys)
              print(f"\n{name}")
              print(f"  alive={ok}")
              print(f"  tvg-id={tid!r}")
              print(f"  logo={logo!r}")
          PY
