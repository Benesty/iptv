name: discover-pools
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: enumerate channels hosted on our pool servers
        run: |
          python3 - <<'PY'
          import urllib.request, urllib.error, re, unicodedata, concurrent.futures as cf
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          def get(url,n=9_000_000):
              try:
                  r=urllib.request.urlopen(urllib.request.Request(url,headers={"User-Agent":UA}),timeout=30)
                  return r.read(n).decode("utf-8","replace")
              except Exception: return ""

          # aggregator playlists that reference our pool hosts
          SRC=[
            "https://iptv-org.github.io/iptv/index.m3u",
            "https://iptv-org.github.io/iptv/countries/fr.m3u",
            "https://raw.githubusercontent.com/schumijo/iptv/main/fr.m3u8",
            "https://raw.githubusercontent.com/Free-TV/IPTV/master/playlists/playlist_france.m3u8",
          ]
          # the servers the user already relies on
          HOSTS=["151.80.18.177","99.27.51.147","145.239.5.177","cdn.haititivi.com",
                 "freetv.fun","41.205.","144.217.253.140","gratuittv.free.fr"]

          # what's already in our playlist (to flag NEW ones)
          have=set()
          try:
              cur=open("TV.m3u",encoding="utf-8").read()
              have={l.strip() for l in cur.splitlines() if l.startswith("http")}
          except Exception: pass

          # host -> {name -> url}
          import collections
          catalog=collections.defaultdict(dict)
          for s in SRC:
              txt=get(s); lines=txt.split("\n")
              for i,l in enumerate(lines):
                  if not l.startswith("#EXTINF"): continue
                  name=l.split(",",1)[-1].strip()
                  u=""
                  for j in range(i+1,min(i+3,len(lines))):
                      if lines[j].strip().startswith("http"): u=lines[j].strip(); break
                  if not u: continue
                  for h in HOSTS:
                      if h in u:
                          catalog[h].setdefault(name, u)
                          break

          # collect all urls to validate
          allpairs=[(h,n,u) for h,d in catalog.items() for n,u in d.items()]
          print(f"Trouvé {len(allpairs)} entrées sur tes serveurs. Test de vivacité…\n")
          def alive(u):
              try:
                  r=urllib.request.urlopen(urllib.request.Request(u,headers={"User-Agent":UA}),timeout=10)
                  b=r.read(400).decode("utf-8","replace")
                  return r.status==200 and ("#EXTM3U" in b or b.lstrip().startswith("#EXT"))
              except Exception: return False
          status={}
          with cf.ThreadPoolExecutor(max_workers=20) as ex:
              futs={ex.submit(alive,u):(h,n,u) for h,n,u in allpairs}
              for f in cf.as_completed(futs):
                  status[futs[f][2]]=f.result()

          for h in HOSTS:
              d=catalog.get(h,{})
              if not d: continue
              live=[(n,u) for n,u in d.items() if status.get(u)]
              print(f"\n########## {h} — {len(live)}/{len(d)} vivantes ##########")
              for n,u in sorted(live):
                  new = "🆕" if u not in have else "  "
                  print(f"  {new} {n[:50]}")
          PY
