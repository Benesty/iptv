name: test-tq
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: probe telequebec debug endpoint
        run: |
          U="https://iptv-lake-three.vercel.app/api/telequebec?debug=1"
          echo "=== HTTP status ==="
          curl -s -o body.json -w "http=%{http_code}\n" --max-time 40 "$U" || true
          echo "=== body ==="
          cat body.json; echo
          echo "=== pretty (if json) ==="
          python3 -c "import json;print(json.dumps(json.load(open('body.json')),indent=2,ensure_ascii=False))" 2>/dev/null || echo "(not JSON)"
