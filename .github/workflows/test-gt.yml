name: Test Gulli 6ter SD

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Gulli/6ter clear-HLS SD candidates
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          B="https://origin-m6web.live.6cloud.fr/out/v1/6play"
          declare -A C=(
            ["M6 baseline (hd)"]="$B/6play-m6/cmaf_q2hyb21h/hls-short-hd.m3u8"
            ["Gulli clear SD"]="$B/6play-gulli/cmaf_q2hyb21h/hls-short-sd.m3u8"
            ["Gulli clear hd720"]="$B/6play-gulli/cmaf_q2hyb21h/hls-short-hd720.m3u8"
            ["6ter clear SD"]="$B/6play-6ter/cmaf_q2hyb21h/hls-short-sd.m3u8"
            ["6ter clear hd720"]="$B/6play-6ter/cmaf_q2hyb21h/hls-short-hd720.m3u8"
          )
          for name in "${!C[@]}"; do
            url="${C[$name]}"
            host=$(echo "$url" | sed -E 's#^(https?://[^/]+)/.*#\1#')
            body=$(curl -A "$UA" -e "$host/" -s -m 20 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            if printf '%s' "$body" | grep -q '#EXTM3U'; then r="OK manifeste"; else r="FAIL"; fi
            echo "=== [$r] code=${code:-000} :: $name"
          done
