name: Inspect 6ter mpd

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Dump 6ter mpd + init structure
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          MPD="https://origin-m6web.live.6cloud.fr/out/v1/6play/6play-6ter/cmaf_cenc00/dash-short-hd.mpd"
          echo "===================== MPD ====================="
          curl -s -A "$UA" -m 20 "$MPD" | head -120
          echo ""
          echo "===================== base dir listing hints ====================="
          echo "MPD base: $(dirname "$MPD")"
