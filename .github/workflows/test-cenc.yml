name: Test cenc mpd

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test 6ter/Gulli CENC mpd raw+proxy
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          PX="https://iptv-lake-three.vercel.app/api/fr?u="
          enc(){ python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1],safe=''))" "$1"; }
          test_one(){
            local label="$1" url="$2"
            local body=$(curl -A "$UA" -s -m 18 -L --max-filesize 300000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            local code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            local r="FAIL"; printf '%s' "$body" | grep -qiE '<MPD|<mpd' && r="OK-mpd"
            local pbody=$(curl -A "$UA" -s -m 22 -L --max-filesize 300000 -w '\nHTTPCODE:%{http_code}' "${PX}$(enc "$url")" 2>/dev/null)
            local pcode=$(printf '%s' "$pbody" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            local pr="FAIL"; printf '%s' "$pbody" | grep -qiE '<MPD|<mpd' && pr="OK-mpd"
            printf '%s raw=%s | proxy=%s %s | %s\n' "$r" "${code:-000}" "${pcode:-000}" "$pr" "$label"
          }
          test_one "Gulli cenc mpd" "https://origin-m6web.live.6cloud.fr/out/v1/6play/6play-gulli/cmaf_cenc00/dash-short-hd.mpd"
          test_one "6ter cenc mpd"  "https://origin-m6web.live.6cloud.fr/out/v1/6play/6play-6ter/cmaf_cenc00/dash-short-hd.mpd"
