name: diag
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: hunt a VERIFIED Chérie 25 (url path must identify the channel)
        run: |
          python3 - <<'PY'
          import urllib.request, re
          from urllib.parse import urljoin
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          def fetch(url,rng=None):
              h={"User-Agent":UA,"Accept":"*/*"}
              if rng:h["Range"]=rng
              r=urllib.request.urlopen(urllib.request.Request(url,headers=h),timeout=20)
              return r.status,r.read(4000 if rng else 200000),r.headers.get("Content-Type",""),r.geturl()
          def first_uri(t,base):
              for ln in t.split("\n"):
                  ln=ln.strip()
                  if ln and not ln.startswith("#"): return urljoin(base,ln)
              return None
          def plays_and_seg(url):
              try:
                  st,b,ct,fin=fetch(url); t=b.decode("utf-8","replace")
                  if not t.lstrip().startswith("#EXT"): return (False,"")
                  cur=fin
                  if "#EXT-X-STREAM-INF" in t:
                      v=first_uri(t,cur); st,b,ct,fin=fetch(v); t=b.decode("utf-8","replace"); cur=fin
                  seg=first_uri(t,cur)
                  if not seg: return (False,"")
                  st,b,ct,fin=fetch(seg,rng="bytes=0-2000")
                  return (st in (200,206) and len(b)>200 and "html" not in ct.lower(), fin)
              except Exception: return (False,"")
          def get(u):
              try: return urllib.request.urlopen(urllib.request.Request(u,headers={"User-Agent":UA}),timeout=45).read().decode("utf-8","replace")
              except Exception: return ""
          SRC=["https://iptv-org.github.io/iptv/index.m3u",
               "https://raw.githubusercontent.com/Free-TV/IPTV/master/playlists/playlist_france.m3u8",
               "https://raw.githubusercontent.com/Paradise-91/ParaTV/main/playlists/paratv/main/paratv-highest.m3u",
               "https://raw.githubusercontent.com/schumijo/iptv/main/fr.m3u8"]
          # collect any URL that mentions cherie/c25 IN THE URL, or whose EXTINF says cherie
          urls=set()
          for s in SRC:
              L=get(s).split("\n")
              for i,l in enumerate(L):
                  if not l.startswith("#EXTINF"): continue
                  u=next((L[j].strip() for j in range(i+1,min(i+3,len(L))) if L[j].strip().startswith("http")),"")
                  if not u: continue
                  lab="chérie" in l.lower() or "cherie" in l.lower()
                  if lab or re.search(r"cherie|/c25/|c25\.|cherie25",u,re.I): urls.add(u)
          # plus known/guessed official NRJ + amagi patterns
          for u in ["https://cherie25.nrjaudio.fm/hls/live/2038375/c25/master.m3u8",
                    "https://cherie25.nrjaudio.fm/hls/live/2038372/c25/master.m3u8",
                    "https://s13.tntendirect.com/cherie25/live/playlist.m3u8"]:
              urls.add(u)
          print(f"{len(urls)} URLs candidates\n")
          good=[]
          for u in sorted(urls):
              ok,seg=plays_and_seg(u)
              ident = re.search(r"cherie|c25", (u+" "+seg), re.I)
              verdict = "✅ JOUE+IDENTIFIÉE" if (ok and ident) else ("⚠️ joue mais NON identifiée" if ok else "❌ morte")
              print(f"   {verdict}")
              print(f"       url: {u[:95]}")
              print(f"       seg: {seg[:95]}")
              if ok and ident: good.append(u)
          print(f"\n>>> Chérie 25 vérifiée: {good or 'AUCUNE'}")
          PY
