name: diag
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deep health-check (master -> variant -> first segment)
        run: |
          python3 - <<'PY'
          import urllib.request, urllib.error, re
          from urllib.parse import urljoin
          import concurrent.futures as cf
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          def fetch(url, rng=None):
              h={"User-Agent":UA,"Accept":"*/*"}
              if rng: h["Range"]=rng
              r=urllib.request.urlopen(urllib.request.Request(url,headers=h),timeout=20)
              return r.status, r.read(rng and 4000 or 200000), r.headers.get("Content-Type","")
          def first_uri(text, base):
              for ln in text.split("\n"):
                  ln=ln.strip()
                  if ln and not ln.startswith("#"):
                      return urljoin(base, ln)
              return None
          def deep(url):
              try:
                  st,b,ct=fetch(url)
                  t=b.decode("utf-8","replace")
                  if "#EXTM3U" not in t and not t.lstrip().startswith("#EXT"): return "master?"
                  cur, curtext = url, t
                  # if master (has STREAM-INF) descend one level
                  if "#EXT-X-STREAM-INF" in curtext:
                      v=first_uri(curtext, cur)
                      if not v: return "no-variant"
                      st,b,ct=fetch(v); curtext=b.decode("utf-8","replace"); cur=v
                  # now media playlist: get first segment
                  seg=first_uri(curtext, cur)
                  if not seg: return "no-seg"
                  st,b,ct=fetch(seg, rng="bytes=0-2000")
                  if st in (200,206) and len(b)>200 and "html" not in ct.lower():
                      return "PLAYS"
                  return f"seg-bad({st},{len(b)}b,{ct[:12]})"
              except urllib.error.HTTPError as e:
                  return f"http{e.code}"
              except Exception as e:
                  return f"err:{type(e).__name__}"
          lines=open("TV.m3u",encoding="utf-8").read().split("\n")
          chans=[]
          for i,l in enumerate(lines):
              if l.startswith("#EXTINF") and 'group-title="France"' in l:
                  name=l.split(",",1)[-1].strip()
                  u=next((lines[j].strip() for j in range(i+1,min(i+4,len(lines))) if lines[j].strip().startswith("http")),"")
                  if u: chans.append((name,u))
          res={}
          with cf.ThreadPoolExecutor(max_workers=12) as ex:
              fut={ex.submit(deep,u):n for n,u in chans}
              for f in cf.as_completed(fut): res[fut[f]]=f.result()
          bad=[]
          for n,_ in chans:
              r=res[n]; ok=r=="PLAYS"
              print(f"  {'✅' if ok else '❌'} {n:26} {r}")
              if not ok: bad.append(n)
          print(f"\n{len(chans)} FR — ne jouent PAS: {len(bad)}")
          if bad: print("  ", ", ".join(bad))
          PY
