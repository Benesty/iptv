name: diag
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: hunt EPG for the 3 orphan channels across all FAST guides
        run: |
          python3 - <<'PY'
          import urllib.request, gzip, io, re, unicodedata
          import xml.etree.ElementTree as ET
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          BASE="https://epgshare01.online/epgshare01/"
          def get(url):
              for _ in range(3):
                  try: return urllib.request.urlopen(urllib.request.Request(url,headers={"User-Agent":UA,"Referer":BASE}),timeout=200).read()
                  except Exception: import time; time.sleep(2)
              return b""
          def norm(s):
              s=unicodedata.normalize("NFKD",s or "").encode("ascii","ignore").decode()
              return re.sub(r"[^a-z0-9]+","",s.lower())
          # what we are hunting (strict substrings on normalized names)
          TARG={"Radio-Canada Jeunesse":["radiocanadajeunesse","rcjeunesse","icijeunesse"],
                "CBC Kids":["cbckids","cbckid"],
                "Noovo Téléréalités":["noovotelerealite","noovotelerealites"]}
          # candidate guide files from epgshare01 index (CA + FAST platforms)
          html=get(BASE).decode("utf-8","replace")
          files=sorted(set(re.findall(r"epg_ripper_[A-Z0-9_]+\.xml\.gz",html)))
          KEY=("CA","PLUTO","PLEX","ROKU","STIRR","XUMO","SAMSUNG","LG","VIZIO","GLOBAL","DISTRO","AMAGI","GOOGLE")
          cand=[BASE+f for f in files if any(k in f for k in KEY)]
          # + matt huisman platform guides
          cand += ["https://i.mjh.nz/PlutoTV/ca.xml","https://i.mjh.nz/Plex/all.xml",
                   "https://i.mjh.nz/Roku/all.xml","https://i.mjh.nz/Stirr/all.xml",
                   "https://i.mjh.nz/PBS/all.xml","https://i.mjh.nz/SamsungTVPlus/ca.xml"]
          print(f"{len(cand)} guides candidats\n")
          found={k:[] for k in TARG}
          for url in cand:
              raw=get(url)
              if not raw: continue
              try: data=gzip.decompress(raw) if url.endswith(".gz") else raw
              except Exception: data=raw
              tag=url.split("/")[-1]
              try:
                  for _e,el in ET.iterparse(io.BytesIO(data),events=("end",)):
                      if el.tag=="channel":
                          cid=el.get("id") or ""
                          names=[d.text for d in el.findall("display-name") if d.text]
                          blob=norm(cid+" "+" ".join(names))
                          for ch,kws in TARG.items():
                              if any(k in blob for k in kws):
                                  found[ch].append((tag,cid,names[:2]))
                          el.clear()
                      elif el.tag=="programme": el.clear()
              except Exception as e:
                  print(f"  (parse err {tag}: {e})")
          for ch in TARG:
              print(f"\n===== {ch} =====")
              if not found[ch]: print("   ❌ introuvable dans tous les guides scannés")
              for tag,cid,names in found[ch]:
                  print(f"   ✅ [{tag}] id={cid!r} names={names}")
          PY
