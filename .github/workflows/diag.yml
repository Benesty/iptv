name: diag
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: full health-check + pool discovery
        run: |
          python3 - <<'PY'
          import urllib.request, re, concurrent.futures as cf
          from urllib.parse import urljoin
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          def fetch(url,rng=None):
              h={"User-Agent":UA,"Accept":"*/*"}
              if rng:h["Range"]=rng
              r=urllib.request.urlopen(urllib.request.Request(url,headers=h),timeout=18)
              return r.status,r.read(4000 if rng else 300000),r.headers.get("Content-Type",""),r.geturl()
          def first_uri(t,base):
              for ln in t.split("\n"):
                  ln=ln.strip()
                  if ln and not ln.startswith("#"): return urljoin(base,ln)
              return None
          def deep(url):
              try:
                  st,b,ct,fin=fetch(url); t=b.decode("utf-8","replace")
                  if "#EXTM3U" not in t and not t.lstrip().startswith("#EXT"): return "dead"
                  cur=fin
                  if "#EXT-X-STREAM-INF" in t:
                      v=first_uri(t,cur)
                      if not v: return "dead"
                      st,b,ct,fin=fetch(v); t=b.decode("utf-8","replace"); cur=fin
                  seg=first_uri(t,cur)
                  if not seg: return "dead"
                  st,b,ct,fin=fetch(seg,rng="bytes=0-2000")
                  if st in (200,206) and len(b)>200 and "html" not in ct.lower(): return "PLAYS"
                  return "dead"
              except urllib.error.HTTPError as e:
                  return "geo" if e.code in (401,403) else "dead"
              except Exception: return "dead"

          ############ PART 1 : test every channel in TV.m3u ############
          lines=open("TV.m3u",encoding="utf-8").read().split("\n")
          chans=[]; group="?"
          for i,l in enumerate(lines):
              if l.startswith("#EXTINF"):
                  g=re.search(r'group-title="([^"]*)"',l); group=g.group(1) if g else "?"
                  name=l.split(",",1)[-1].strip()
                  u=next((lines[j].strip() for j in range(i+1,min(i+4,len(lines))) if lines[j].strip().startswith("http")),"")
                  if u: chans.append((group,name,u))
          res={}
          with cf.ThreadPoolExecutor(max_workers=14) as ex:
              fut={ex.submit(deep,u):(g,n) for g,n,u in chans}
              for f in cf.as_completed(fut): res[fut[f]]=f.result()
          print(f"===== SANTÉ DE TOUTES LES CHAÎNES ({len(chans)}) =====")
          dead=[]
          curg=None
          for g,n,u in chans:
              if g!=curg: print(f"\n--- {g} ---"); curg=g
              st=res[(g,n)]; tag={"PLAYS":"✅","geo":"🌍"}.get(st,"💀")
              print(f"  {tag} {n}")
              if tag=="💀": dead.append(f"{g}/{n}")
          print(f"\n>>> DOWN ({len(dead)}): "+(", ".join(dead) if dead else "aucune"))

          ############ PART 2 : new FR channels on our pool servers ############
          def get(u):
              try: return urllib.request.urlopen(urllib.request.Request(u,headers={"User-Agent":UA}),timeout=45).read().decode("utf-8","replace")
              except Exception: return ""
          POOLS=["145.239.5.177","151.80.18.177","99.27.51.147"]
          have=set(l.strip() for l in lines if l.startswith("http"))
          idx=get("https://iptv-org.github.io/iptv/index.m3u")
          L=idx.split("\n")
          # host -> {name: url}, only FR (tvg-id .fr) and not already in playlist
          import collections
          cat=collections.defaultdict(dict)
          for i,l in enumerate(L):
              if not l.startswith("#EXTINF"): continue
              name=l.split(",",1)[-1].strip()
              if any(x in name for x in ("Gecko","Safari","Chrome")): continue
              tid=(re.search(r'tvg-id="([^"]*)"',l) or [None,""])[1]
              if ".fr" not in tid.lower(): continue   # France only
              u=next((L[j].strip() for j in range(i+1,min(i+3,len(L))) if L[j].strip().startswith("http")),"")
              for h in POOLS:
                  if u and h in u and u not in have: cat[h][name]=u
          # validate discovered ones (segment level)
          disc=[(h,n,u) for h,d in cat.items() for n,u in d.items()]
          st2={}
          with cf.ThreadPoolExecutor(max_workers=14) as ex:
              fut={ex.submit(deep,u):(h,n,u) for h,n,u in disc}
              for f in cf.as_completed(fut): st2[fut[f][2]]=f.result()
          print(f"\n\n===== NOUVELLES CHAÎNES FR VIVANTES SUR TES SERVEURS =====")
          for h in POOLS:
              rows=[(n,u) for n,u in cat.get(h,{}).items() if st2.get(u)=="PLAYS"]
              if not rows: continue
              print(f"\n--- {h} ({len(rows)}) ---")
              for n,u in sorted(rows): print(f"   🆕 {n[:40]:40} {u}")
          PY
