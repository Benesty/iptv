name: diag
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: hunt verified replacements for Chérie 25 / W9 / Teletoon+
        run: |
          python3 - <<'PY'
          import urllib.request, re
          from urllib.parse import urljoin
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          def fetch(url,rng=None):
              h={"User-Agent":UA,"Accept":"*/*"}
              if rng:h["Range"]=rng
              r=urllib.request.urlopen(urllib.request.Request(url,headers=h),timeout=18)
              return r.status,r.read(4000 if rng else 200000),r.headers.get("Content-Type",""),r.geturl()
          def first_uri(t,base):
              for ln in t.split("\n"):
                  ln=ln.strip()
                  if ln and not ln.startswith("#"): return urljoin(base,ln)
              return None
          def check(url):
              """return (plays, final_segment_url)"""
              try:
                  st,b,ct,fin=fetch(url); t=b.decode("utf-8","replace")
                  if not t.lstrip().startswith("#EXT"): return (False,"")
                  cur=fin
                  if "#EXT-X-STREAM-INF" in t:
                      v=first_uri(t,cur)
                      if not v: return (False,"")
                      st,b,ct,fin=fetch(v); t=b.decode("utf-8","replace"); cur=fin
                  seg=first_uri(t,cur)
                  if not seg: return (False,"")
                  st,b,ct,fin=fetch(seg,rng="bytes=0-2000")
                  return (st in (200,206) and len(b)>200 and "html" not in ct.lower(), fin)
              except Exception: return (False,"")
          def get(u):
              try: return urllib.request.urlopen(urllib.request.Request(u,headers={"User-Agent":UA}),timeout=45).read().decode("utf-8","replace")
              except Exception: return ""
          SRC=["https://iptv-org.github.io/iptv/index.m3u",
               "https://iptv-org.github.io/iptv/countries/fr.m3u",
               "https://raw.githubusercontent.com/Free-TV/IPTV/master/playlists/playlist_france.m3u8",
               "https://raw.githubusercontent.com/Paradise-91/ParaTV/main/playlists/paratv/main/paratv-highest.m3u",
               "https://raw.githubusercontent.com/schumijo/iptv/main/fr.m3u8",
               "https://raw.githubusercontent.com/ipstreet312/freeiptv/master/ressources/rtlm6/py/w9.m3u8"]
          feeds=[(s,get(s)) for s in SRC]
          # channel -> (label keywords in EXTINF, identity regex the URL/segment must satisfy, hard extra urls)
          TARG={
            "Chérie 25":(["chérie","cherie"], r"cherie|c25", []),
            "W9":([">w9","> w9"," w9 ","w9 [","w9(","w9hd","6play-w9"], r"w9|6play-w9", [
                  "https://viamotionhsi.netplus.ch/live/eds/w9/browser-HLS8/w9.m3u8"]),
            "Teletoon+":(["teletoon"], r"teletoon", [
                  "http://144.217.253.140/Teletoon/tracks-v1a1/index.m3u8"]),
          }
          for name,(keys,identre,hard) in TARG.items():
              print(f"\n########## {name} ##########")
              urls=list(hard)
              for src,txt in feeds:
                  L=txt.split("\n")
                  for i,l in enumerate(L):
                      if not l.startswith("#EXTINF"): continue
                      if any(k in l.lower() for k in keys):
                          u=next((L[j].strip() for j in range(i+1,min(i+3,len(L))) if L[j].strip().startswith("http")),"")
                          if u and u not in urls: urls.append(u)
              winner=None
              for u in urls:
                  ok,seg=check(u)
                  ident = bool(re.search(identre,(u+" "+seg),re.I))
                  tag = "✅ JOUE+IDENT" if (ok and ident) else ("⚠️ joue/NON-ident" if ok else "❌ morte")
                  print(f"   {tag}  {u[:88]}")
                  if seg: print(f"        seg: {seg[:88]}")
                  if ok and ident and not winner: winner=u
              print(f"   >>> GAGNANT {name}: {winner or 'AUCUNE source correcte'}")
          PY
