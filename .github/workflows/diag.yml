name: diag
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: dump exact EPG channel ids (CA reachable via discover)
        run: |
          python3 - <<'PY'
          import urllib.request, gzip, io, re, unicodedata
          import xml.etree.ElementTree as ET
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          BASE="https://epgshare01.online/epgshare01/"
          def get(url,n=250_000_000):
              last=None
              for _ in range(4):
                  try:
                      return urllib.request.urlopen(urllib.request.Request(url,headers={"User-Agent":UA,"Referer":BASE}),timeout=180).read()
                  except Exception as e: last=e; import time; time.sleep(3)
              print("  !!",url,last); return b""
          def norm(s):
              s=unicodedata.normalize("NFKD",s or "").encode("ascii","ignore").decode()
              return re.sub(r"[^a-z0-9]+","",s.lower())
          # discover CA + FR national files
          html=get(BASE).decode("utf-8","replace")
          files=set(re.findall(r"epg_ripper_[A-Z0-9_]+\.xml\.gz",html))
          def pick(c):
              cs=sorted(f for f in files if re.fullmatch(rf"epg_ripper_{c}\d+\.xml\.gz",f))
              return BASE+cs[0] if cs else None
          SRC=[("FR",pick("FR"),True),("CA",pick("CA"),True),
               ("samsung-ca","https://i.mjh.nz/SamsungTVPlus/ca.xml",False)]
          print("fichiers:",[ (t,(u or '').split('/')[-1]) for t,u,_ in SRC])
          # dump channels matching these keyword groups
          GROUPS={
            "CANAL+ (chaîne principale)":lambda n,i: norm(n) in ("canal","canalplus","canalclair","canalenclair") or norm(i) in ("canalfr","canalplusfr"),
            "NOOVO":lambda n,i:"noovo" in norm(n),
            "CBC":lambda n,i:"cbc" in norm(n),
            "RADIO-CANADA / ICI / JEUNESSE":lambda n,i:("radiocanada" in norm(n)) or ("jeunesse" in norm(n)) or norm(n).startswith("ici"),
          }
          import collections
          out=collections.defaultdict(list)
          for tag,url,gz in SRC:
              if not url: print("  pas de fichier pour",tag); continue
              raw=get(url)
              if not raw: continue
              try: data=gzip.decompress(raw) if gz else raw
              except Exception: data=raw
              n=0
              for _e,el in ET.iterparse(io.BytesIO(data),events=("end",)):
                  if el.tag=="channel":
                      n+=1; cid=el.get("id") or ""
                      names=[d.text for d in el.findall("display-name") if d.text]
                      for g,fn in GROUPS.items():
                          if any(fn(nm,cid) for nm in names):
                              out[g].append((tag,cid,names[:2]))
                      el.clear()
                  elif el.tag=="programme": el.clear()
              print(f"  {tag}: {n} chaînes")
          for g in GROUPS:
              print(f"\n===== {g} =====")
              seen=set()
              for tag,cid,names in out.get(g,[]):
                  if cid in seen: continue
                  seen.add(cid)
                  print(f"   [{tag:11}] {cid:26} {names}")
              if not out.get(g): print("   (rien)")
          PY
