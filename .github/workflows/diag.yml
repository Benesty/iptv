name: diag
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: lookup remaining channels
        run: |
          python3 - <<'PY'
          import urllib.request, gzip, io, re, unicodedata
          import xml.etree.ElementTree as ET
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          BASE="https://epgshare01.online/epgshare01/"
          def get(url):
              for _ in range(4):
                  try: return urllib.request.urlopen(urllib.request.Request(url,headers={"User-Agent":UA,"Referer":BASE}),timeout=180).read()
                  except Exception: import time; time.sleep(3)
              return b""
          def norm(s):
              s=unicodedata.normalize("NFKD",s or "").encode("ascii","ignore").decode()
              return re.sub(r"[^a-z0-9]+","",s.lower())
          html=get(BASE).decode("utf-8","replace")
          files=set(re.findall(r"epg_ripper_[A-Z0-9_]+\.xml\.gz",html))
          def pick(c):
              cs=sorted(f for f in files if re.fullmatch(rf"epg_ripper_{c}\d+\.xml\.gz",f))
              return BASE+cs[0] if cs else None
          SRC=[("FR",pick("FR"),True),("CA",pick("CA"),True),
               ("sam-ca","https://i.mjh.nz/SamsungTVPlus/ca.xml",False),
               ("sam-fr","https://i.mjh.nz/SamsungTVPlus/fr.xml",False)]
          KW=["cinema","foot","noovo","cbckid","cbc kid","jeunesse","kids"]
          for tag,url,gz in SRC:
              if not url: continue
              raw=get(url)
              if not raw: print(tag,"KO"); continue
              try: data=gzip.decompress(raw) if gz else raw
              except Exception: data=raw
              print(f"\n===== {tag} =====")
              for _e,el in ET.iterparse(io.BytesIO(data),events=("end",)):
                  if el.tag=="channel":
                      cid=el.get("id") or ""
                      names=[d.text for d in el.findall("display-name") if d.text]
                      blob=norm(cid+" "+" ".join(names))
                      if any(norm(k) in blob for k in KW):
                          print(f"   {cid:28} {names[:2]}")
                      el.clear()
                  elif el.tag=="programme": el.clear()
          PY
