name: diag
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: find a PLAYING source for L'Équipe and Chérie 25
        run: |
          python3 - <<'PY'
          import urllib.request, urllib.error, re
          from urllib.parse import urljoin
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          def fetch(url,rng=None):
              h={"User-Agent":UA,"Accept":"*/*"}
              if rng:h["Range"]=rng
              r=urllib.request.urlopen(urllib.request.Request(url,headers=h),timeout=20)
              return r.status,r.read(4000 if rng else 200000),r.headers.get("Content-Type",""),r.geturl()
          def first_uri(t,base):
              for ln in t.split("\n"):
                  ln=ln.strip()
                  if ln and not ln.startswith("#"): return urljoin(base,ln)
              return None
          def plays(url):
              try:
                  st,b,ct,fin=fetch(url); t=b.decode("utf-8","replace")
                  if not t.lstrip().startswith("#EXT"): return False
                  cur=fin
                  if "#EXT-X-STREAM-INF" in t:
                      v=first_uri(t,cur);
                      if not v: return False
                      st,b,ct,fin=fetch(v); t=b.decode("utf-8","replace"); cur=fin
                  seg=first_uri(t,cur)
                  if not seg: return False
                  st,b,ct,fin=fetch(seg,rng="bytes=0-2000")
                  return st in (200,206) and len(b)>200 and "html" not in ct.lower()
              except Exception: return False
          def get(url):
              try: return urllib.request.urlopen(urllib.request.Request(url,headers={"User-Agent":UA}),timeout=40).read().decode("utf-8","replace")
              except Exception: return ""
          # gather candidates from aggregators by name/id
          AGG=[get("https://iptv-org.github.io/iptv/countries/fr.m3u"),
               get("https://raw.githubusercontent.com/Paradise-91/ParaTV/main/playlists/paratv/main/paratv-highest.m3u"),
               get("https://raw.githubusercontent.com/schumijo/iptv/main/fr.m3u8")]
          def cands_for(keys):
              out=[]
              for txt in AGG:
                  L=txt.split("\n")
                  for i,l in enumerate(L):
                      if not l.startswith("#EXTINF"): continue
                      low=l.lower()
                      if any(k in low for k in keys):
                          u=next((L[j].strip() for j in range(i+1,min(i+3,len(L))) if L[j].strip().startswith("http")),"")
                          if u and u not in out: out.append(u)
              return out
          TARGETS={
            "La Chaîne L'Équipe":(["l'équipe","lequipe","la chaine l","lachaine l"],
                 ["https://iptv-lake-three.vercel.app/api/fr?id=LEquipe21.fr"]),
            "Chérie 25":(["chérie 25","cherie 25","cherie25"],
                 ["https://cherie25.nrjaudio.fm/hls/live/2038375/c25/master.m3u8",
                  "https://cherie25.nrjaudio.fm/hls/live/2038375/c25/FHD.m3u8",
                  "https://s13.tntendirect.com/cherie25/live/playlist.m3u8",
                  "http://41.205.77.102/CHERIE25/index.m3u8"]),
          }
          for name,(keys,hard) in TARGETS.items():
              print(f"\n===== {name} =====")
              seen=set(); winner=None
              for u in hard+cands_for(keys):
                  if u in seen: continue
                  seen.add(u)
                  ok=plays(u)
                  print(f"   {'✅ PLAYS' if ok else '❌      '} {u[:95]}")
                  if ok and not winner: winner=u
              print(f"   -> GAGNANT: {winner}")
          PY
