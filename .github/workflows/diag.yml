name: diag
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: full urls + Chérie identity
        run: |
          python3 - <<'PY'
          import urllib.request, re
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          def get(u):
              try: return urllib.request.urlopen(urllib.request.Request(u,headers={"User-Agent":UA}),timeout=40).read().decode("utf-8","replace")
              except Exception as e: return f"ERR {e}"
          # 1) full L'Équipe cloudfront + paratv URLs from the aggregators
          para=get("https://raw.githubusercontent.com/Paradise-91/ParaTV/main/playlists/paratv/main/paratv-highest.m3u")
          schu=get("https://raw.githubusercontent.com/schumijo/iptv/main/fr.m3u8")
          org=get("https://iptv-org.github.io/iptv/countries/fr.m3u")
          def dump(txt,keys,label):
              print(f"\n===== {label} =====")
              L=txt.split("\n")
              for i,l in enumerate(L):
                  if l.startswith("#EXTINF") and any(k in l.lower() for k in keys):
                      u=next((L[j].strip() for j in range(i+1,min(i+3,len(L))) if L[j].strip().startswith("http")),"")
                      # show tvg-id + name + url  (to catch mislabels)
                      tid=(re.search(r'tvg-id="([^"]*)"',l) or [None,"?"])[1]
                      nm=l.split(",",1)[-1].strip()
                      print(f"   id={tid:20} name={nm[:22]:22} -> {u}")
          for tag,txt in [("paratv",para),("schumijo",schu),("iptv-org",org)]:
              dump(txt,["l'équipe","lequipe","equipe"],f"L'ÉQUIPE @ {tag}")
          for tag,txt in [("paratv",para),("schumijo",schu),("iptv-org",org)]:
              dump(txt,["chérie","cherie"],f"CHÉRIE 25 @ {tag}")
          PY
