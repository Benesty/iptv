name: Test FR kids deco

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test FR kids + deco FAST channels
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          declare -A C=(
            ["Beyblade"]="https://jmp2.uk/stvp-FR1400001VU"
            ["Pocoyo"]="https://jmp2.uk/stvp-FR700001VJ"
            ["Les Lapins Cretins"]="https://jmp2.uk/stvp-FRBD2300002CM"
            ["Mr Bean Animated"]="https://jmp2.uk/stvp-FR90000160"
            ["Charlotte aux Fraises"]="https://jmp2.uk/stvp-FRBD1900012T7"
            ["SuperToons TV"]="https://jmp2.uk/stvp-FRBD5100002NL"
            ["Bob l eponge"]="https://jmp2.uk/stvp-FRAJ3800010QO"
            ["Pluto TV Toons"]="https://jmp2.uk/stvp-FRAJ38000035M"
            ["Caillou"]="https://jmp2.uk/stvp-FR4800002NE"
            ["100% Kidz"]="https://jmp2.uk/stvp-FR3400004L5"
            ["Masha et Michka"]="https://jmp2.uk/stvp-FR38000024W"
            ["La Maison France 5"]="https://jmp2.uk/stvp-FR4200001BN"
            ["Pluto TV Cuisine"]="https://jmp2.uk/stvp-FRBA3300044VR"
          )
          for name in "${!C[@]}"; do
            url="${C[$name]}"
            body=$(curl -A "$UA" -s -m 18 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            if printf '%s' "$body" | grep -q '#EXTM3U'; then r="OK  "; else r="FAIL"; fi
            printf '%s | %s | %s\n' "$r" "${code:-000}" "$name"
          done | sort
