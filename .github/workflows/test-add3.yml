name: Test add fix

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test corrected stvp URLs
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          PX="https://iptv-lake-three.vercel.app/api/fr?u="
          enc(){ python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1],safe=''))" "$1"; }
          traw(){
            local label="$1" url="$2"
            local body=$(curl -A "$UA" -s -m 18 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            local code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            local r="FAIL"; printf '%s' "$body" | grep -q '#EXTM3U' && r="OK  "
            printf '%s raw=%s | %s\n' "$r" "${code:-000}" "$label"
          }
          tproxy(){
            local label="$1" url="$2"
            local pbody=$(curl -A "$UA" -s -m 22 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "${PX}$(enc "$url")" 2>/dev/null)
            local pcode=$(printf '%s' "$pbody" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            local pr="FAIL"; printf '%s' "$pbody" | grep -q '#EXTM3U' && pr="OK  "
            printf '%s proxy=%s | %s\n' "$pr" "${pcode:-000}" "$label"
          }
          echo "=== CANADA (raw, sans .m3u8) ==="
          traw "CTV News"           "https://jmp2.uk/stvp-CA1400004AE"
          traw "Weather Network"    "https://jmp2.uk/stvp-CABC23000223U"
          traw "Court TV Canada"    "https://jmp2.uk/stvp-CABA3700005AD"
          traw "Law and Crime CA"   "https://jmp2.uk/stvp-CAAJ3400002DI"
          traw "Stingray Nostalgie" "https://jmp2.uk/stvp-CA2900017MW"
          traw "Stingray Franco Pop" "https://jmp2.uk/stvp-CA290001647"
          traw "CBC News Quebec"    "https://jmp2.uk/stvp-CA4600005WZ"
          echo "=== FRANCE (raw + proxy, sans .m3u8) ==="
          for pair in "BFM2=stvp-FR1400003Y0" "Euronews FR=stvp-FR2600004SS" "Skyrock=stvp-FR4000005KE" "Juste Pour Rire=stvp-FRBA3300035UK"; do
            n="${pair%%=*}"; id="${pair#*=}"; u="https://jmp2.uk/$id"
            traw "$n" "$u"; tproxy "$n" "$u"
          done
