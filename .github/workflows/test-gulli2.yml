name: Test Gulli clr

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Gulli CloudFront + 6ter Orange
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          P="https://iptv-lake-three.vercel.app/api/fr?u="
          declare -A C=(
            ["Gulli cloudfront clr raw"]="https://d13anarbtxy8c5.cloudfront.net/6play/short/clr/gulli/sdindex.m3u8"
            ["Gulli cloudfront clr proxy"]="${P}https%3A%2F%2Fd13anarbtxy8c5.cloudfront.net%2F6play%2Fshort%2Fclr%2Fgulli%2Fsdindex.m3u8"
            ["6ter orange raw"]="http://cdn.webtv4.cdnfr.orange.fr/hs/HALO4/hls/6ter-850445/hls/index.m3u8"
            ["6ter cloudfront clr proxy"]="${P}https%3A%2F%2Fd13anarbtxy8c5.cloudfront.net%2F6play%2Fshort%2Fclr%2F6ter%2Fsdindex.m3u8"
          )
          for name in "${!C[@]}"; do
            url="${C[$name]}"
            host=$(echo "$url" | sed -E 's#^(https?://[^/]+)/.*#\1#')
            body=$(curl -A "$UA" -e "$host/" -s -m 20 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            if printf '%s' "$body" | grep -q '#EXTM3U'; then r="OK  "; else r="FAIL"; fi
            printf '%s | %s | %s\n' "$r" "${code:-000}" "$name"
          done | sort
