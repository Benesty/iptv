name: Probe TF1 renditions

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Probe TF1 adaptive master via proxy
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (SmartTV)"
          PX="https://iptv-lake-three.vercel.app/api/fr?u="
          enc(){ python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1],safe=''))" "$1"; }
          # 1) URL courante TF1 depuis ParaTV
          PARATV=$(curl -s -m 20 "https://raw.githubusercontent.com/Paradise-91/ParaTV/main/playlists/paratv/main/paratv-highest.m3u" | awk '/,[0-9]+\. TF1 /{getline; print; exit}' | tr -d "\r")
          echo "ParaTV TF1 file: $PARATV"
          # 2) le fichier -highest contient l'URL TF1 tokenisée -> extraire base
          VID=$(curl -s -m 20 "$PARATV" | grep -oE 'https://live-tf1-hls[^"]*index_1\.m3u8' | head -1)
          echo "Video rendition URL: ${VID:0:90}..."
          BASE="${VID%index_1.m3u8}"
          echo "Base: ...${BASE: -60}"
          # 3) sonder master + renditions plus basses via le proxy (IP Vercel = cip du token)
          for name in master.m3u8 index.m3u8 index_2.m3u8 index_3.m3u8 index_4.m3u8 index_5.m3u8; do
            u="${BASE}${name}"
            body=$(curl -A "$UA" -s -m 20 "${PX}$(enc "$u")" 2>/dev/null)
            code=$(printf '%s' "$body" | grep -c 'RESOLUTION\|EXTINF')
            res=$(printf '%s' "$body" | grep -oE 'RESOLUTION=[0-9x]+|BANDWIDTH=[0-9]+' | tr '\n' ' ')
            first=$(printf '%s' "$body" | head -1)
            printf '%-14s | lignes=%s | %s | %s\n' "$name" "$code" "${first:0:20}" "${res:0:60}"
          done
