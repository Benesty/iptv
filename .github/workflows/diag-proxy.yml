name: Diag proxy
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test proxy channels
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (SmartTV)"
          while IFS='|' read -r n u; do
            b=$(curl -A "$UA" -s -m 20 -L --max-filesize 200000 -w "\nH:%{http_code}" "$u" 2>/dev/null)
            c=$(printf "%s" "$b" | sed -n "s/.*H:\([0-9]*\)$/\1/p" | tail -1)
            r=FAIL; printf "%s" "$b" | grep -q "#EXTM3U" && r="OK  "
            printf "%s | %s | %s\n" "$r" "${c:-000}" "$n"
          done <<'EOF'
          TF1|https://iptv-lake-three.vercel.app/api/fr?id=TF1.fr
