name: Test Gulli 3

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Gulli official variants raw+proxy
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          PX="https://iptv-lake-three.vercel.app/api/fr?u="
          enc(){ python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1],safe=''))" "$1"; }
          test_one(){
            local label="$1" url="$2"
            local host=$(echo "$url" | sed -E 's#^(https?://[^/]+)/.*#\1#')
            local body=$(curl -A "$UA" -e "$host/" -s -m 18 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            local code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            local r="FAIL"; printf '%s' "$body" | grep -q '#EXTM3U' && r="OK  "
            local pbody=$(curl -A "$UA" -s -m 22 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "${PX}$(enc "$url")" 2>/dev/null)
            local pcode=$(printf '%s' "$pbody" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            local pr="FAIL"; printf '%s' "$pbody" | grep -q '#EXTM3U' && pr="OK"
            printf '%s raw=%s | proxy=%s %s | %s\n' "$r" "${code:-000}" "${pcode:-000}" "$pr" "$label"
          }
          test_one "Gulli hlsfmp4 (new)" "https://origin-caf900c010ea8046.live.6cloud.fr/out/v1/c65696b42ca34e97a9b5f54758d6dd50/cmaf/hlsfmp4_short_q2hyb21h_gulli_sd_index.m3u8"
          test_one "Gulli lbcdn"         "https://lbcdn.6cloud.fr/resource/m6web/l/gulli_hls_sd_short_q2hyb21h.m3u8?groups[]=m6web-live-gulli_ext"
          test_one "Gulli origin2"       "https://origin2-6play.live.6cloud.fr/pool_rnpls9by/gulli/sixplaysd/hls_short_q2hyb21h_gulli/index.m3u8"
