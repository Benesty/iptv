name: Test add CA FR

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test CA + FR FAST candidates raw+proxy
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          PX="https://iptv-lake-three.vercel.app/api/fr?u="
          enc(){ python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1],safe=''))" "$1"; }
          traw(){
            local label="$1" url="$2"
            local host=$(echo "$url" | sed -E 's#^(https?://[^/]+)/.*#\1#')
            local body=$(curl -A "$UA" -e "$host/" -s -m 18 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            local code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            local r="FAIL"; printf '%s' "$body" | grep -q '#EXTM3U' && r="OK  "
            printf '%s raw=%s | %s\n' "$r" "${code:-000}" "$label"
          }
          tproxy(){
            local label="$1" url="$2"
            local pbody=$(curl -A "$UA" -s -m 22 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "${PX}$(enc "$url")" 2>/dev/null)
            local pcode=$(printf '%s' "$pbody" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            local pr="FAIL"; printf '%s' "$pbody" | grep -q '#EXTM3U' && pr="OK  "
            printf '%s proxy=%s | %s\n' "$pr" "${pcode:-000}" "$label"
          }
          echo "=== CANADA (raw ; 403=geo-CA OK chez toi) ==="
          traw "CTV News"           "https://jmp2.uk/stvp-CA1400004AE.m3u8"
          traw "Weather Network"    "https://jmp2.uk/stvp-CABC23000223U.m3u8"
          traw "Global News Nat"    "https://jmp2.uk/plu-62cbef9ebb857100072fc187.m3u8"
          traw "Court TV Canada"    "https://jmp2.uk/stvp-CABA3700005AD.m3u8"
          traw "Law and Crime CA"   "https://jmp2.uk/stvp-CAAJ3400002DI.m3u8"
          traw "Stingray Nostalgie" "https://jmp2.uk/stvp-CA2900017MW.m3u8"
          traw "Stingray Franco Pop" "https://jmp2.uk/stvp-CA290001647.m3u8"
          traw "CBC News Quebec"    "https://jmp2.uk/stvp-CA4600005WZ.m3u8"
          echo "=== FRANCE (proxy Paris) ==="
          tproxy "BFM2"             "https://jmp2.uk/stvp-FR1400003Y0.m3u8"
          tproxy "Euronews FR"      "https://jmp2.uk/stvp-FR2600004SS.m3u8"
          tproxy "Skyrock"          "https://jmp2.uk/stvp-FR4000005KE.m3u8"
          tproxy "Juste Pour Rire"  "https://jmp2.uk/stvp-FRBA3300035UK.m3u8"
