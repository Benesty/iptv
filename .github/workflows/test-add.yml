name: Test additions

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test candidate channels (CA + US)
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          declare -A C=(
            ["CA CBC Montreal off"]="https://cbcrclinear-tor.akamaized.net/hls/live/2042761/CBCRCLINEAR_TOR_7/master5.m3u8"
            ["CA ICI Tele HD nat"]="https://rcavlive.akamaized.net/hls/live/696615/xcancbft/master.m3u8"
            ["CA ICI Tele Quebec"]="https://rcavlive.akamaized.net/hls/live/664045/cancbvt/master.m3u8"
            ["CA TVA national"]="https://tvalive-nondai.akamaized.net/Content/HLS/Live/channel(a7315e07-037c-12a8-bdc8-da7bd513da9d)/index.m3u8"
            ["CA CPAC EN"]="https://d7z3qjdsxbwoq.cloudfront.net/groupa/live/f9809cea-1e07-47cd-a94d-2ddd3e1351db/live.isml/.m3u8"
            ["CA CPAC FR"]="https://bcsecurelivehls-i.akamaihd.net/hls/live/680604/1242843915001_3/master.m3u8"
            ["CA Weather Network"]="https://cdn-uw2-prod.tsv2.amagi.tv/linear/amg01442-pelmorexcorp-theweathernetwork-lgca/playlist.m3u8"
            ["CA TVOKids"]="https://bcovlive-a.akamaihd.net/rf86f817779524249abf842af6d16f55f/us-east-1/15364602001/playlist.m3u8"
            ["CA Fight Network"]="https://d12a2vxqkkh1bo.cloudfront.net/hls/main.m3u8"
            ["CA Global Toronto"]="https://d128o1k7zh3htz.cloudfront.net/out/v1/74a58360a3734f97b74ba439bc678044/index.m3u8"
            ["CA CTV News Channel"]="https://pe-fa-lp02a.9c9media.com/live/News1Digi/p/hls/00000201/38ef78f479b07aa0/index/0c6a10a2/live/stream/h264/v1/3500000/manifest.m3u8"
            ["US ABC News Live"]="https://jmp2.uk/plu-6508be683a0d700008c534e4.m3u8"
            ["US NBC News Now"]="http://dai2.xumo.com/xumocdn/p=roku/amagi_hls_data_xumo1212A-xumo-nbcnewsnow/CDN/playlist.m3u8"
            ["US Al Jazeera EN"]="https://live-hls-web-aje-fa.thehlive.com/AJE/index.m3u8"
            ["US Sky News"]="https://siloh.pluto.tv/lilo/production/SkyNews/master.m3u8"
            ["US Scripps News"]="https://jmp2.uk/plu-5459795fc9f133a519bc0bef.m3u8"
            ["US Newsmax"]="https://nmx1ota.akamaized.net/hls/live/2107010/Live_1/index.m3u8"
            ["US Cheddar"]="https://jmp2.uk/stvp-USAJ3504714A"
            ["US DW English"]="https://dwamdstream102.akamaized.net/hls/live/2015525/dwstream102/master.m3u8"
            ["US Court TV"]="https://jmp2.uk/plu-5dae0b4841a7d0000938ddbd.m3u8"
            ["US NFL Channel"]="https://jmp2.uk/plu-5ced7d5df64be98e07ed47b6.m3u8"
            ["US beIN Sports XTRA"]="https://jmp2.uk/stvp-USAJ4300001Q7"
            ["US Stadium"]="https://jmp2.uk/stvp-USAJ3504705A"
            ["US PGA TOUR"]="https://jmp2.uk/plu-5de94dacb394a300099fa22a.m3u8"
            ["US MTV Pluto"]="https://jmp2.uk/plu-5ca672f515a62078d2ec0ad2.m3u8"
            ["US Comedy Central"]="https://jmp2.uk/plu-5ca671f215a62078d2ec0abf.m3u8"
            ["US Smithsonian"]="https://jmp2.uk/plu-5f21ea08007a49000762d349.m3u8"
            ["US FOX Weather"]="https://jmp2.uk/plu-640a68880e884c0009979cc2.m3u8"
            ["US Paramount Movie"]="https://jmp2.uk/plu-5cb0cae7a461406ffe3f5213.m3u8"
            ["US MovieSphere"]="https://jmp2.uk/plu-645e7828e1979c00087b75b4.m3u8"
          )
          for name in "${!C[@]}"; do
            url="${C[$name]}"
            host=$(echo "$url" | sed -E 's#^(https?://[^/]+)/.*#\1#')
            body=$(curl -A "$UA" -e "$host/" -s -m 20 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            if printf '%s' "$body" | grep -q '#EXTM3U'; then r="OK  "; else r="FAIL"; fi
            printf '%s | %s | %s\n' "$r" "${code:-000}" "$name"
          done | sort
