name: test-fast
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: probe
        run: |
          python3 - <<'PY'
          import urllib.request
          UA="Mozilla/5.0 (SmartTV) AppleWebKit/537.36"
          cands = {
            "Weather Network":  "https://jmp2.uk/stvp-CABC23000223U",
            "CBC News Ottawa":  "https://amagi-streams.akamaized.net/hls/live/2113383/cbcottawa/master1080p.m3u8",
            "CBC News Edmonton":"https://amagi-streams.akamaized.net/hls/live/2113387/cbcedmonton/master1080p.m3u8",
            "CBC News Calgary": "https://jmp2.uk/stvp-CA4600010PN",
            "Haunt TV":         "https://blueantmediacanada-haunttv-samsungca.amagi.tv/playlist.m3u8",
            "MHz Now":          "https://jmp2.uk/stvp-CAAJ34000158F",
            "InWonder":         "https://inwonder-samsung-canada.amagi.tv/playlist.m3u8",
            "Insight TV":       "https://insighttv-samsung-canada.amagi.tv/playlist.m3u8",
            "Players TV":       "https://playerstv-samsungca.amagi.tv/playlist.m3u8",
          }
          for name,url in cands.items():
            try:
              req=urllib.request.Request(url,headers={"User-Agent":UA})
              r=urllib.request.urlopen(req,timeout=25)
              body=r.read(600).decode("utf-8","replace")
              ok="#EXTM3U" in body
              drm=any(k in body for k in ("#EXT-X-KEY","com.widevine","cenc","playready"))
              print(f"{name:18s} {r.status}  EXTM3U={ok}  DRM={drm}")
            except urllib.error.HTTPError as e:
              print(f"{name:18s} HTTP {e.code}")
            except Exception as e:
              print(f"{name:18s} ERR {type(e).__name__} {e}")
          PY
