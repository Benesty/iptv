name: test-fast
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: probe
        run: |
          python3 - <<'PY'
          import urllib.request, time
          UA="Mozilla/5.0 (SmartTV) AppleWebKit/537.36"
          url="https://d7z3qjdsxbwoq.cloudfront.net/groupa/live/f9809cea-1e07-47cd-a94d-2ddd3e1351db/live.isml/.m3u8"
          for i in range(4):
            try:
              req=urllib.request.Request(url,headers={"User-Agent":UA})
              r=urllib.request.urlopen(req,timeout=25)
              body=r.read(400).decode("utf-8","replace")
              print(f"CPAC try{i} {r.status} EXTM3U={'#EXTM3U' in body}")
            except urllib.error.HTTPError as e:
              print(f"CPAC try{i} HTTP {e.code}")
            except Exception as e:
              print(f"CPAC try{i} ERR {type(e).__name__} {e}")
            time.sleep(3)
          PY
