name: test-fast
on:
  workflow_dispatch:

jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: probe
        run: |
          python3 - <<'PY'
          import urllib.request
          UA="Mozilla/5.0 (SmartTV) AppleWebKit/537.36"
          cands = {
            "RC INFO":          "https://d2pe0mcuntasoo.cloudfront.net/v1/master/3722c60a815c199d9c0ef36c5b73da68a62b09d1/cc-haex9tv0eft0g/Radio-Canada_INFO.m3u8",
            "Noovo Cinema":     "https://dk4ogs46bjxcw.cloudfront.net/v1/master/3722c60a815c199d9c0ef36c5b73da68a62b09d1/cc-xr1ct045l70mz/Noovo_Cinema.m3u8",
            "Noovo Comedies":   "https://d2s8iafdyzconc.cloudfront.net/v1/master/3722c60a815c199d9c0ef36c5b73da68a62b09d1/cc-6x2p3ho0vw00a/Noovo_Comedies_Home.m3u8",
            "Noovo Telereal":   "https://d29qczaufx5vc3.cloudfront.net/v1/master/3722c60a815c199d9c0ef36c5b73da68a62b09d1/cc-dxg2k6h0o2l6i/Noovo_Telerealites.m3u8",
            "ICI Tele Quebec":  "https://rcavlive.akamaized.net/hls/live/664045/cancbvt/master.m3u8",
            "CBC Kids":         "https://amagi-streams.akamaized.net/hls/live/2120483/cbckids/master.m3u8",
            "CBC Comedy":       "https://amagi-streams.akamaized.net/hls/live/2110963/cbccomedy/master.m3u8",
            "CBC News Toronto": "https://amagi-streams.akamaized.net/hls/live/2110961/cbctoronto/master.m3u8",
            "CBC News BC":      "https://amagi-streams.akamaized.net/hls/live/2110960/cbcnewsbc/master.m3u8",
            "Schitts Creek":    "https://amagi-streams.akamaized.net/hls/live/2120484/schittscreek/master.m3u8",
            "RC Jeunesse(ref)": "https://amagi-streams.akamaized.net/hls/live/2120485/rcjeunesse/master.m3u8",
          }
          for name,url in cands.items():
            try:
              req=urllib.request.Request(url,headers={"User-Agent":UA})
              r=urllib.request.urlopen(req,timeout=25)
              body=r.read(400).decode("utf-8","replace")
              ok="#EXTM3U" in body
              print(f"{name:18s} {r.status}  EXTM3U={ok}")
            except urllib.error.HTTPError as e:
              print(f"{name:18s} HTTP {e.code}")
            except Exception as e:
              print(f"{name:18s} ERR {type(e).__name__} {e}")
          PY
