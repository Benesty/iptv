name: Test CA home

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test CA home/deco/cooking FAST
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          declare -A C=(
            ["Property Brothers"]="https://jmp2.uk/stvp-CA1400017PU"
            ["Martha Stewart"]="https://jmp2.uk/stvp-CA4500001CL"
            ["This Old House"]="https://jmp2.uk/stvp-CABB25000248J"
            ["Tiny House Nation"]="https://jmp2.uk/stvp-CA9000103C"
            ["The Design Network"]="https://jmp2.uk/stvp-CAAJ3400016J9"
            ["Homeful"]="https://jmp2.uk/stvp-CABC5200022N1"
            ["Tastemade Home"]="https://jmp2.uk/stvp-CABC5200002OG"
            ["Emeril Lagasse"]="https://jmp2.uk/stvp-CA4500002UA"
            ["Tastemade"]="https://jmp2.uk/stvp-CABD1200002T9"
            ["BBC Home Garden"]="https://jmp2.uk/stvp-CABD1200012B8"
            ["BBC Food"]="https://jmp2.uk/stvp-CABD1200010LE"
            ["Architectural Digest"]="https://jmp2.uk/stvp-CABC5200009HX"
            ["Bon Appetit"]="https://jmp2.uk/stvp-CABC5200006AL"
            ["Flipping Nation"]="https://jmp2.uk/stvp-CA900008L6"
          )
          for name in "${!C[@]}"; do
            url="${C[$name]}"
            body=$(curl -A "$UA" -s -m 18 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            if printf '%s' "$body" | grep -q '#EXTM3U'; then r="OK  "; else r="FAIL"; fi
            printf '%s | %s | %s\n' "$r" "${code:-000}" "$name"
          done | sort
