name: Check IPTV links

# Teste chaque flux de TV.m3u depuis un runner GitHub (accès internet complet).
# Lancement manuel depuis l'onglet Actions, ou via l'API.
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test each stream URL
        run: |
          UA="VLC/3.0.20 LibVLC/3.0.20"
          FILE="TV.m3u"
          chan=""
          alive=0; geo=0; dead=0; total=0
          {
            echo "# Résultat du test des flux"
            echo ""
            echo "| Statut | Code | Chaîne | URL |"
            echo "|---|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          while IFS= read -r line || [ -n "$line" ]; do
            case "$line" in
              \#EXTINF*) chan="${line##*,}" ;;
              http*)
                total=$((total+1))
                code=$(curl -A "$UA" -s -o /dev/null -m 15 -L -w '%{http_code}' "$line" 2>/dev/null)
                # certains CDN refusent HEAD/GET complet : retente en range
                if [ "$code" = "000" ] || [ "$code" = "405" ]; then
                  code=$(curl -A "$UA" -s -o /dev/null -m 15 -L -r 0-2048 -w '%{http_code}' "$line" 2>/dev/null)
                fi
                case "$code" in
                  2*|30*) status="✅ ALIVE"; alive=$((alive+1)) ;;
                  401|403|451) status="🌍 GEO/AUTH"; geo=$((geo+1)) ;;
                  *) status="❌ DEAD"; dead=$((dead+1)) ;;
                esac
                echo "$status | $code | $chan"
                echo "| $status | $code | ${chan} | \`${line:0:60}\` |" >> "$GITHUB_STEP_SUMMARY"
                ;;
            esac
          done < "$FILE"

          {
            echo ""
            echo "**Total: $total — ✅ $alive vivants · 🌍 $geo géo/auth · ❌ $dead morts**"
            echo ""
            echo "_Runner US : les chaînes 🇫🇷 françaises et 🇨🇦 canadiennes peuvent apparaître 🌍 GEO (bloquées hors zone) tout en marchant chez toi. Seuls les ❌ DEAD sont réellement HS._"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "=== RÉSUMÉ: $total testés | $alive vivants | $geo géo/auth | $dead morts ==="
