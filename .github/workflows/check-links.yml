name: Check IPTV links

# Teste chaque flux de TV.m3u depuis un runner GitHub (accès internet complet).
# Un lien est "OK" UNIQUEMENT si le serveur renvoie un manifeste HLS valide
# (#EXTM3U) — un simple code 200 ne suffit pas. Tout le reste = FAIL.
on:
  workflow_dispatch:
  push:
    paths:
      - 'TV.m3u'
      - '.github/workflows/check-links.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test each stream URL (strict manifest validation)
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          FILE="TV.m3u"
          chan=""; ok=0; fail=0; total=0
          {
            echo "# Test strict des flux (manifeste HLS validé)"
            echo ""
            echo "| Résultat | Code | Chaîne |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          while IFS= read -r line || [ -n "$line" ]; do
            case "$line" in
              \#EXTINF*) chan="${line##*,}" ;;
              http*)
                total=$((total+1))
                host=$(echo "$line" | sed -E 's#^(https?://[^/]+)/.*#\1#')
                # télécharge le début du flux et capture le code HTTP
                body=$(curl -A "$UA" -e "$host/" -s -m 20 -L --max-filesize 200000 \
                       -w '\nHTTPCODE:%{http_code}' "$line" 2>/dev/null)
                code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
                if printf '%s' "$body" | grep -q '#EXTM3U'; then
                  result="✅ OK (manifeste valide)"; ok=$((ok+1))
                else
                  result="❌ FAIL"; fail=$((fail+1))
                fi
                echo "$result | ${code:-000} | $chan"
                echo "| $result | ${code:-000} | ${chan} |" >> "$GITHUB_STEP_SUMMARY"
                ;;
            esac
          done < "$FILE"

          {
            echo ""
            echo "**$total testés — ✅ $ok manifeste valide · ❌ $fail échec**"
            echo ""
            echo "_OK = le serveur a réellement renvoyé un manifeste HLS jouable depuis ce runner (US). Un flux géo-bloqué hors-US apparaît en FAIL ici même s'il marche dans sa zone._"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "=== RÉSUMÉ: $total testés | $ok OK | $fail FAIL ==="
