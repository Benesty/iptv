name: Test mjh HGTV

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test i.mjh.nz HGTV + sources
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          declare -A C=(
            ["HGTV fullscreen.nz"]="https://mediapackage-hgtv-source.fullscreen.nz/index.m3u8"
            ["i.mjh.nz Plex all (head)"]="https://i.mjh.nz/Plex/all.m3u8"
            ["i.mjh.nz SamsungTVPlus CA (head)"]="https://i.mjh.nz/SamsungTVPlus/ca.m3u8"
          )
          for name in "${!C[@]}"; do
            url="${C[$name]}"
            body=$(curl -A "$UA" -s -m 25 -L --max-filesize 300000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            if printf '%s' "$body" | grep -q '#EXTM3U'; then r="OK manifeste"; else r="FAIL"; fi
            echo "=== [$r] code=${code:-000} :: $name"
          done
          echo "--- HGTV: nombre de lignes HGTV dans la playlist Samsung CA ---"
          curl -A "$UA" -s -m 25 -L "https://i.mjh.nz/SamsungTVPlus/ca.m3u8" 2>/dev/null | grep -iE "hgtv|magnolia|diy|cottage|home" | head -20 || echo "(rien)"
