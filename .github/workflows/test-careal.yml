name: Test CA real

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test real free CA channels
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          declare -A C=(
            ["Weather Network"]="https://jmp2.uk/stvp-CABC23000223U"
            ["Court TV Canada"]="https://jmp2.uk/stvp-CABA3700005AD"
            ["Law and Crime CA"]="https://jmp2.uk/stvp-CAAJ3400002DI"
            ["Global News National"]="https://jmp2.uk/plu-62cbef9ebb857100072fc187.m3u8"
            ["DAZN TV"]="https://jmp2.uk/plu-647f07e74cfc2c0008a2e557.m3u8"
            ["NASCAR Channel"]="https://jmp2.uk/stvp-CA700002VS"
            ["beIN Sports XTRA CA"]="https://jmp2.uk/stvp-CABA8000043F"
            ["Radio-Canada Info"]="https://jmp2.uk/stvp-CABC2300010E4"
          )
          for name in "${!C[@]}"; do
            url="${C[$name]}"
            body=$(curl -A "$UA" -s -m 18 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            if printf '%s' "$body" | grep -q '#EXTM3U'; then r="OK  "; else r="FAIL"; fi
            printf '%s | %s | %s\n' "$r" "${code:-000}" "$name"
          done | sort
