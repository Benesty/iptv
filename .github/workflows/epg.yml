name: Build EPG

# Fusionne les guides FR + CA + US chaque jour en un seul fichier epg.xml.gz,
# publié sur la branche `epg` (force-push = pas de gonflement de l'historique).
# url-tvg dans TV.m3u pointe dessus.
on:
  schedule:
    - cron: "30 4 * * *"   # tous les jours 04:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build merged EPG
        run: python3 scripts/build_epg.py

      - name: Gzip
        run: gzip -f epg.xml && ls -lh epg.xml.gz

      - name: Publish to `epg` branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp epg.xml.gz /tmp/epg.xml.gz
          git checkout -B epg
          git rm -rf . > /dev/null 2>&1 || true
          cp /tmp/epg.xml.gz epg.xml.gz
          git add -f epg.xml.gz
          git commit -m "EPG update $(date -u +%F)"
          git push -f origin epg
