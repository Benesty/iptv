name: Test kids alt

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test FR kids alternative sources
        shell: bash {0}
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          declare -A C=(
            ["it-zone Nickelodeon FR"]="https://tv.it-zone.tech/proxy/963996?voucher=0AYVA9ZB"
            ["it-zone Nick Junior"]="https://tv.it-zone.tech/proxy/964002?voucher=0AYVA9ZB"
            ["it-zone Canal J"]="https://tv.it-zone.tech/proxy/964008?voucher=0AYVA9ZB"
            ["reseller Disney Junior 41.205"]="http://41.205.64.66/DISNEY-JUNIOR/index.m3u8"
            ["current 151.80 Canal J"]="http://151.80.18.177:86/Canal_J_HD/index.m3u8"
            ["current 151.80 Nickelodeon"]="http://151.80.18.177:86/Nickelodeon_FR/index.m3u8"
          )
          for name in "${!C[@]}"; do
            url="${C[$name]}"
            host=$(echo "$url" | sed -E 's#^(https?://[^/]+)/.*#\1#')
            body=$(curl -A "$UA" -e "$host/" -s -m 20 -L --max-filesize 200000 -w '\nHTTPCODE:%{http_code}' "$url" 2>/dev/null)
            code=$(printf '%s' "$body" | sed -n 's/.*HTTPCODE:\([0-9]*\)$/\1/p' | tail -1)
            if printf '%s' "$body" | grep -q '#EXTM3U'; then r="OK  "; else r="FAIL"; fi
            printf '%s | %s | %s\n' "$r" "${code:-000}" "$name"
          done | sort
